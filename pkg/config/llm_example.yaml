# HypGo LLM 智慧增強配置
# 放置於 .hyp/llm.yaml
# 使用方式：hyp chkcomment --llm .hyp/llm.yaml

# ============================================================
# mode: 控制 LLM 增強模式
# ============================================================
# "none"   — 不使用 LLM，只做純 Go 推斷（零成本，預設值）
# "ollama" — 連接本地 Ollama 伺服器
# "api"    — 連接遠端 API（OpenAI / Anthropic / Gemini）

mode: none

# ============================================================
# Mode 1: Ollama（本地模型，零費用，建議開發用）
# ============================================================
# 前置條件：安裝 Ollama (https://ollama.com) 並下載模型
#   ollama pull llama3
#   ollama pull codellama

# mode: ollama
# ollama:
#   url: "http://localhost:11434"    # Ollama API 位址
#   model: "llama3"                  # 模型名稱
#   timeout: 30                      # 請求逾時（秒）
#   max_tokens: 256                  # 最大回應 token 數

# ============================================================
# Mode 2: API（遠端模型，付費，建議正式環境用）
# ============================================================
# 支援 provider：openai, anthropic, gemini, custom
# api_key 支援環境變數：${OPENAI_API_KEY}

# --- OpenAI ---
# mode: api
# api:
#   provider: "openai"
#   model: "gpt-4o-mini"             # 建議用小模型，降低成本
#   api_key: "${OPENAI_API_KEY}"     # 從環境變數讀取
#   timeout: 30
#   max_tokens: 256

