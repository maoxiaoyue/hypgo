<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 775" width="1000" height="775">

    <defs>
        <!-- ── 流動虛線動畫 ── -->
        <style>
            @keyframes flowBlue   { to { stroke-dashoffset: -24; } }
            @keyframes flowGreen  { to { stroke-dashoffset: -24; } }
            @keyframes flowOrange { to { stroke-dashoffset: -24; } }
            @keyframes flowRed    { to { stroke-dashoffset: -24; } }
            @keyframes flowGray   { to { stroke-dashoffset: -24; } }

            .flow-blue {
                stroke-dasharray: 8 4; stroke-dashoffset: 0;
                animation: flowBlue 1.4s linear infinite;
            }
            .flow-green {
                stroke-dasharray: 8 4; stroke-dashoffset: 0;
                animation: flowGreen 0.9s linear infinite;
            }
            .flow-orange {
                stroke-dasharray: 8 4; stroke-dashoffset: 0;
                animation: flowOrange 1.8s linear infinite;
            }
            .flow-red {
                stroke-dasharray: 8 4; stroke-dashoffset: 0;
                animation: flowRed 1.6s linear infinite;
            }
            .flow-gray {
                stroke-dasharray: 8 4; stroke-dashoffset: 0;
                animation: flowGray 2.8s linear infinite;
            }
            .flow-blue-hook {
                stroke-dasharray: 5 3; stroke-dashoffset: 0;
                animation: flowBlue 1.2s linear infinite;
            }
        </style>

        <!-- 箭頭標記：灰色 -->
        <marker id="arrow" viewBox="0 0 12 12" refX="8" refY="6"
                markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 1 2 L 10 6 L 1 10 Z" fill="#64748b"/>
        </marker>
        <!-- 箭頭標記：藍色 -->
        <marker id="arrow-blue" viewBox="0 0 12 12" refX="8" refY="6"
                markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 1 2 L 10 6 L 1 10 Z" fill="#38bdf8"/>
        </marker>
        <!-- 箭頭標記：綠色 -->
        <marker id="arrow-green" viewBox="0 0 12 12" refX="8" refY="6"
                markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 1 2 L 10 6 L 1 10 Z" fill="#10b981"/>
        </marker>
        <!-- 箭頭標記：橘色 -->
        <marker id="arrow-orange" viewBox="0 0 12 12" refX="8" refY="6"
                markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 1 2 L 10 6 L 1 10 Z" fill="#f59e0b"/>
        </marker>
        <!-- 箭頭標記：紅色 -->
        <marker id="arrow-red" viewBox="0 0 12 12" refX="8" refY="6"
                markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 1 2 L 10 6 L 1 10 Z" fill="#e11d48"/>
        </marker>

        <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0284c7"/>
            <stop offset="100%" stop-color="#0369a1"/>
        </linearGradient>
        <linearGradient id="auxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#d97706"/>
            <stop offset="100%" stop-color="#b45309"/>
        </linearGradient>
    </defs>

    <!-- 背景 -->
    <rect width="1000" height="775" fill="#0f172a"/>

    <!-- ══════════════════════════════════════════════════
         0. Trigger Layer — CI/CD Pipeline / CLI Terminal
    ══════════════════════════════════════════════════ -->
    <g id="layer-trigger">
        <rect x="375" y="20" width="250" height="65" rx="6"
              fill="#475569" stroke="#64748b" stroke-width="1.5"/>
        <text x="500" y="47" fill="#f8fafc" font-size="14" font-weight="bold"
              text-anchor="middle">CI/CD Pipeline / CLI Terminal</text>
        <text x="500" y="65" fill="#7dd3fc" font-size="10"
              text-anchor="middle">📦 cmd/hyp · hyp impact · hyp test · hyp chkcomment</text>
        <!-- 👤 Human-in-side badge -->
        <rect x="545" y="23" width="76" height="15" rx="3"
              fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
        <text x="583" y="33" fill="#93c5fd" font-size="9" font-weight="bold"
              text-anchor="middle">👤 Human-in-side</text>

        <!-- ↓ Trigger → Execution Engine (blue) -->
        <path class="flow-blue" d="M 500 85 L 500 142"
              fill="none" stroke="#38bdf8" stroke-width="2"
              marker-end="url(#arrow-blue)"/>
    </g>

    <!-- Main Harness Boundary -->
    <rect x="40" y="100" width="920" height="570" rx="12"
          fill="#0f172a" stroke="#334155" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="60" y="125" fill="#64748b" font-size="12" font-weight="bold"
          letter-spacing="1">AI TEST HARNESS BOUNDARY</text>

    <!-- ══════════════════════════════════════════════════
         1. Dataset &amp; Fact Management Module
    ══════════════════════════════════════════════════ -->
    <g id="mod-dataset">
        <rect x="70" y="150" width="240" height="100" rx="8"
              fill="url(#coreGrad)" stroke="#38bdf8" stroke-width="1.5"/>
        <text x="90" y="178" fill="#f8fafc" font-size="15" font-weight="bold">1. 測試資料集模組</text>
        <text x="90" y="195" fill="#e2e8f0" font-size="12">Dataset &amp; Fact Management</text>
        <text x="90" y="212" fill="#7dd3fc" font-size="10">📦 pkg/fixture · pkg/migrate · pkg/schema</text>
        <text x="90" y="226" fill="#7dd3fc" font-size="10">     contract.TestAll() · pkg/contract</text>
        <!-- 👤 Human-in-side badge -->
        <rect x="220" y="153" width="85" height="15" rx="3"
              fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
        <text x="262" y="163" fill="#93c5fd" font-size="9" font-weight="bold"
              text-anchor="middle">👤 Human-in-side</text>

        <!-- → Dataset → Execution Engine (blue) -->
        <path class="flow-blue" d="M 310 200 L 362 200"
              fill="none" stroke="#38bdf8" stroke-width="2"
              marker-end="url(#arrow-blue)"/>
    </g>

    <!-- ══════════════════════════════════════════════════
         2. Execution &amp; Orchestration Engine
    ══════════════════════════════════════════════════ -->
    <g id="mod-execution">
        <rect x="370" y="150" width="260" height="100" rx="8"
              fill="url(#coreGrad)" stroke="#38bdf8" stroke-width="1.5"/>
        <text x="390" y="178" fill="#f8fafc" font-size="15" font-weight="bold">2. 執行與編排引擎</text>
        <text x="390" y="195" fill="#e2e8f0" font-size="12">Execution Engine (Rate Limit/Retry)</text>
        <text x="390" y="212" fill="#7dd3fc" font-size="10">📦 pkg/server · pkg/router · pkg/middleware</text>
        <text x="390" y="226" fill="#7dd3fc" font-size="10">     pkg/context · pkg/config</text>
    </g>

    <!-- ══════════════════════════════════════════════════
         TARGET AI SYSTEM
    ══════════════════════════════════════════════════ -->
    <g id="target-ai">
        <rect x="710" y="150" width="220" height="265" rx="8"
              fill="#064e3b" stroke="#10b981" stroke-width="2"/>
        <text x="820" y="182" fill="#f8fafc" font-size="16" font-weight="bold"
              text-anchor="middle">受測目標系統</text>
        <text x="820" y="200" fill="#a7f3d0" font-size="13"
              text-anchor="middle">Target AI System / Agent</text>
        <!-- 👤 Human-in-side badge -->
        <rect x="795" y="153" width="130" height="15" rx="3"
              fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
        <text x="860" y="163" fill="#93c5fd" font-size="9" font-weight="bold"
              text-anchor="middle">👤 Human-in-side</text>

        <path d="M 730 218 L 910 218" stroke="#047857" stroke-width="1"/>

        <!-- LLM / Core box -->
        <rect x="730" y="235" width="180" height="52" rx="4"
              fill="#022c22" stroke="#059669"/>
        <text x="820" y="256" fill="#a7f3d0" font-size="12"
              text-anchor="middle">LLM / Core Workflows</text>
        <text x="820" y="274" fill="#5eead4" font-size="10"
              text-anchor="middle">📦 pkg/manifest · pkg/schema</text>

        <!-- Agent Tools box -->
        <rect x="730" y="302" width="180" height="52" rx="4"
              fill="#022c22" stroke="#059669"/>
        <text x="820" y="323" fill="#a7f3d0" font-size="12"
              text-anchor="middle">Agent Tools (DB/API/Web)</text>
        <text x="820" y="341" fill="#5eead4" font-size="10"
              text-anchor="middle">📦 pkg/hidb · pkg/websocket</text>

        <!-- HypGo app note -->
        <text x="820" y="382" fill="#6ee7b7" font-size="11"
              text-anchor="middle">HypGo App Under Test</text>
        <text x="820" y="398" fill="#5eead4" font-size="10"
              text-anchor="middle">pkg/server · pkg/router · pkg/hidb</text>

        <!-- → 餵入 Input: Execution → Target (green) -->
        <path class="flow-green" d="M 630 180 L 702 180"
              fill="none" stroke="#10b981" stroke-width="2"
              marker-end="url(#arrow-green)"/>
        <text x="666" y="170" fill="#10b981" font-size="11" text-anchor="middle">餵入 Input</text>

        <!-- ← 回傳 Output: Target → Execution (green) -->
        <path class="flow-green" d="M 710 214 L 638 214"
              fill="none" stroke="#10b981" stroke-width="2"
              marker-end="url(#arrow-green)"/>
        <text x="670" y="228" fill="#10b981" font-size="11" text-anchor="middle">回傳 Output</text>
    </g>

    <!-- ══════════════════════════════════════════════════
         3. Tracing &amp; Context Observability Module
    ══════════════════════════════════════════════════ -->
    <g id="mod-tracing">
        <rect x="370" y="310" width="260" height="110" rx="8"
              fill="url(#coreGrad)" stroke="#38bdf8" stroke-width="1.5"/>
        <text x="390" y="340" fill="#f8fafc" font-size="15" font-weight="bold">3. 追蹤與日誌模組</text>
        <text x="390" y="357" fill="#e2e8f0" font-size="12">Tracing &amp; Context Observability</text>
        <text x="390" y="374" fill="#7dd3fc" font-size="10">📦 pkg/logger · pkg/diagnostic</text>
        <text x="390" y="388" fill="#7dd3fc" font-size="10">     pkg/autosync · context.yaml</text>

        <!-- ↓ Execution → Tracing (blue) -->
        <path class="flow-blue" d="M 500 250 L 500 302"
              fill="none" stroke="#38bdf8" stroke-width="2"
              marker-end="url(#arrow-blue)"/>
        <text x="518" y="280" fill="#38bdf8" font-size="11">捕捉內部 Traces</text>

        <!-- ← Hook 攔截: Target → Tracing (blue hook) -->
        <path class="flow-blue-hook" d="M 710 365 L 638 365"
              fill="none" stroke="#38bdf8" stroke-width="1.5"
              marker-end="url(#arrow-blue)"/>
        <text x="674" y="357" fill="#38bdf8" font-size="10" text-anchor="middle">Hook 攔截</text>
    </g>

    <!-- ══════════════════════════════════════════════════
         4. Evaluation &amp; Scoring Matrix Module
    ══════════════════════════════════════════════════ -->
    <g id="mod-evaluation">
        <rect x="370" y="455" width="260" height="115" rx="8"
              fill="url(#coreGrad)" stroke="#38bdf8" stroke-width="1.5"/>
        <text x="390" y="484" fill="#f8fafc" font-size="15" font-weight="bold">4. 評估與評判模組</text>
        <text x="390" y="501" fill="#e2e8f0" font-size="12">Evaluation &amp; Scoring Matrix</text>
        <text x="390" y="517" fill="#93c5fd" font-size="10">Deterministic &amp; Probabilistic Graders</text>
        <text x="390" y="533" fill="#7dd3fc" font-size="10">📦 pkg/contract · pkg/errors</text>
        <text x="390" y="547" fill="#7dd3fc" font-size="10">     pkg/annotation · pkg/impact</text>

        <!-- ↓ Tracing → Evaluation 非同步佇列 (orange) -->
        <path class="flow-orange" d="M 500 420 L 500 447"
              fill="none" stroke="#f59e0b" stroke-width="2"
              marker-end="url(#arrow-orange)"/>
        <text x="518" y="437" fill="#fbbf24" font-size="11">非同步批量佇列 (Async DB)</text>
    </g>

    <!-- ══════════════════════════════════════════════════
         5. Reporter &amp; Assertions Module
    ══════════════════════════════════════════════════ -->
    <g id="mod-reporter">
        <rect x="70" y="455" width="240" height="110" rx="8"
              fill="url(#coreGrad)" stroke="#38bdf8" stroke-width="1.5"/>
        <text x="90" y="484" fill="#f8fafc" font-size="15" font-weight="bold">5. 報告與斷言模組</text>
        <text x="90" y="501" fill="#e2e8f0" font-size="12">Reporter &amp; Assertions</text>
        <text x="90" y="518" fill="#7dd3fc" font-size="10">📦 contract.TestAll() · pkg/impact</text>
        <text x="90" y="532" fill="#7dd3fc" font-size="10">     hyp chkcomment · pkg/errors</text>
        <!-- 👤 Human-in-side badge -->
        <rect x="220" y="458" width="85" height="15" rx="3"
              fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
        <text x="262" y="468" fill="#93c5fd" font-size="9" font-weight="bold"
              text-anchor="middle">👤 Human-in-side</text>

        <!-- ← Evaluation → Reporter (blue) -->
        <path class="flow-blue" d="M 370 510 L 318 510"
              fill="none" stroke="#38bdf8" stroke-width="2"
              marker-end="url(#arrow-blue)"/>
    </g>

    <!-- ══════════════════════════════════════════════════
         AUXILIARY SERVICES
    ══════════════════════════════════════════════════ -->

    <!-- Aux 1: Synthetic Data Generator -->
    <g id="aux-synthetic">
        <rect x="70" y="270" width="240" height="75" rx="6"
              fill="url(#auxGrad)" stroke="#fbbf24" stroke-width="1"/>
        <text x="85" y="296" fill="#f8fafc" font-size="13" font-weight="bold">合成資料生成服務 (LLM)</text>
        <text x="85" y="313" fill="#fde68a" font-size="11">Synthetic Data Generator</text>
        <text x="85" y="328" fill="#fef3c7" font-size="10">📦 pkg/fixture · pkg/scaffold · pkg/manifest</text>

        <!-- ↑ Synthetic → Dataset (orange) -->
        <path class="flow-orange" d="M 190 270 L 190 253"
              fill="none" stroke="#fbbf24" stroke-width="1.5"
              marker-end="url(#arrow-orange)"/>
    </g>

    <!-- Aux 2: Mock &amp; Sandbox Service -->
    <g id="aux-mock">
        <rect x="710" y="430" width="220" height="75" rx="6"
              fill="url(#auxGrad)" stroke="#fbbf24" stroke-width="1"/>
        <text x="725" y="456" fill="#f8fafc" font-size="13" font-weight="bold">沙箱與擋板服務 (Mock)</text>
        <text x="725" y="473" fill="#fde68a" font-size="11">Mock &amp; Sandbox Service</text>
        <text x="725" y="488" fill="#fef3c7" font-size="10">📦 pkg/fixture (httptest) · pkg/watcher</text>

        <!-- ↓ Agent Tools → Mock (orange) -->
        <path class="flow-orange" d="M 820 354 L 820 422"
              fill="none" stroke="#fbbf24" stroke-width="1.5"
              marker-end="url(#arrow-orange)"/>
        <text x="836" y="392" fill="#fbbf24" font-size="10">攔截破壞性操作</text>
    </g>

    <!-- Aux 3: Judge Prompt &amp; Rubric Registry -->
    <g id="aux-registry">
        <rect x="370" y="595" width="260" height="68" rx="6"
              fill="url(#auxGrad)" stroke="#fbbf24" stroke-width="1"/>
        <text x="500" y="617" fill="#f8fafc" font-size="13" font-weight="bold"
              text-anchor="middle">裁判提示詞倉庫 (Registry)</text>
        <text x="500" y="633" fill="#fde68a" font-size="11"
              text-anchor="middle">Judge Prompt &amp; Rubric Registry</text>
        <text x="500" y="649" fill="#fef3c7" font-size="10"
              text-anchor="middle">📦 pkg/annotation · pkg/schema/registry</text>
        <!-- 👤 Human-in-side badge -->
        <rect x="540" y="598" width="85" height="15" rx="3"
              fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
        <text x="582" y="608" fill="#93c5fd" font-size="9" font-weight="bold"
              text-anchor="middle">👤 Human-in-side</text>

        <!-- ↑ Registry → Evaluation (orange) -->
        <path class="flow-orange" d="M 500 595 L 500 572"
              fill="none" stroke="#fbbf24" stroke-width="1.5"
              marker-end="url(#arrow-orange)"/>
    </g>

    <!-- ══════════════════════════════════════════════════
         INFRASTRUCTURE LAYER
    ══════════════════════════════════════════════════ -->
    <g id="layer-infra">
        <!-- Assert Pass/Fail: Reporter → CI/CD 繞左側邊界外 (red) -->
        <path class="flow-red" d="M 70 510 L 18 510 L 18 45 L 373 45"
              fill="none" stroke="#e11d48" stroke-width="2"
              marker-end="url(#arrow-red)"/>
        <text x="28" y="280" fill="#f43f5e" font-size="11" font-weight="bold"
              transform="rotate(-90, 28, 280)">Assert Pass/Fail</text>

        <!-- Traces DB -->
        <rect x="250" y="678" width="220" height="70" rx="6"
              fill="#334155" stroke="#475569" stroke-width="1.5"/>
        <text x="360" y="702" fill="#f8fafc" font-size="13" font-weight="bold"
              text-anchor="middle">時序資料庫 / 儲存層</text>
        <text x="360" y="718" fill="#94a3b8" font-size="11"
              text-anchor="middle">Traces DB (ClickHouse / Mongo)</text>
        <text x="360" y="733" fill="#7dd3fc" font-size="10"
              text-anchor="middle">📦 pkg/hidb · pkg/hidb/redis</text>

        <!-- ↓ Evaluation → Traces DB：N型折線繞 Registry 左側 (gray) -->
        <path class="flow-gray" d="M 390 570 L 390 588 L 290 588 L 290 670"
              fill="none" stroke="#64748b" stroke-width="1.5"
              marker-end="url(#arrow)"/>

        <!-- Judge LLM Infrastructure -->
        <rect x="530" y="678" width="220" height="70" rx="6"
              fill="#334155" stroke="#475569" stroke-width="1.5"/>
        <text x="640" y="702" fill="#f8fafc" font-size="13" font-weight="bold"
              text-anchor="middle">裁判大模型基礎設施</text>
        <text x="640" y="718" fill="#94a3b8" font-size="11"
              text-anchor="middle">Judge LLM (GPT-4o / Claude)</text>
        <text x="640" y="733" fill="#7dd3fc" font-size="10"
              text-anchor="middle">📦 pkg/manifest/llm_enricher · Ollama/API</text>

        <!-- ↓ Evaluation → Judge LLM：N型折線繞 Registry 右側 (gray) -->
        <path class="flow-gray" d="M 610 570 L 610 588 L 715 588 L 715 670"
              fill="none" stroke="#64748b" stroke-width="1.5"
              marker-end="url(#arrow)"/>
    </g>

</svg>
